---
k3d_cluster_name: mathtrail-dev
k3d_registry_name: mathtrail-registry
k3d_registry_port: "5050"
k3d_servers: 1
k3d_agents: 2
k3d_port_http: "80:80@loadbalancer"
k3d_port_https: "443:443@loadbalancer"
k3d_registries_config: ""
k3d_cluster_state: present
# Path to custom resolv.conf mounted into k3d nodes.
# On Ubuntu 24.04 the default /etc/resolv.conf points to 127.0.0.53 (systemd-resolved stub),
# which is unreachable from inside Docker containers — containerd fails to pull external images.
k3d_resolv_conf: /etc/k3d-resolv.conf
# DNS servers written into k3d_resolv_conf.
# On Ubuntu 24.04 the default resolv.conf uses 127.0.0.53 (systemd-resolved stub)
# which is unreachable from inside Docker containers.
# k3d-mathtrail-registry resolves via /etc/hosts (added by --registry-use), not DNS.
# Override in group_vars for corporate environments with internal DNS.
k3d_dns_servers:
  - 8.8.8.8
  - 1.1.1.1
k3d_kubeconfig_path: "{{ ansible_facts['env']['HOME'] }}/.kube/k3d-{{ k3d_cluster_name }}.yaml"
