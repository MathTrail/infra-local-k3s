---
k3d_cluster_name: mathtrail-dev
k3d_registry_name: mathtrail-registry
k3d_registry_port: "5050"
k3d_servers: 1
k3d_agents: 2
k3d_port_http: "80:80@loadbalancer"
k3d_port_https: "443:443@loadbalancer"
k3d_registries_config: ""
k3d_cluster_state: present
k3d_kubeconfig_path: "{{ ansible_facts['env']['HOME'] }}/.kube/k3d-{{ k3d_cluster_name }}.yaml"
