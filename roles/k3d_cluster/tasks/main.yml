---
- name: Get existing clusters
  ansible.builtin.command: k3d cluster list -o json
  register: _k3d_clusters
  changed_when: false

- name: Set cluster_exists fact
  ansible.builtin.set_fact:
    _k3d_cluster_exists: "{{ k3d_cluster_name in (_k3d_clusters.stdout | from_json | map(attribute='name') | list) }}"

- name: Create cluster
  when: k3d_cluster_state == 'present' and not _k3d_cluster_exists
  block:
    - name: Create registry (idempotent)
      ansible.builtin.command: k3d registry create {{ k3d_registry_name }} --port {{ k3d_registry_port }}
      register: _registry_create
      failed_when: _registry_create.rc != 0 and 'already exists' not in _registry_create.stderr

    - name: Create k3d cluster
      ansible.builtin.command: >
        k3d cluster create {{ k3d_cluster_name }}
        --servers {{ k3d_servers }}
        --agents {{ k3d_agents }}
        --port {{ k3d_port_http }}
        --port {{ k3d_port_https }}
        --registry-use k3d-{{ k3d_registry_name }}:{{ k3d_registry_port }}
        --registry-config {{ k3d_registries_config }}
        --wait
        --timeout 120s

- name: Save and merge kubeconfig
  ansible.builtin.shell: |
    set -e
    mkdir -p "$(dirname "{{ k3d_kubeconfig_path }}")"
    k3d kubeconfig get {{ k3d_cluster_name }} > "{{ k3d_kubeconfig_path }}"
    chmod 600 "{{ k3d_kubeconfig_path }}"
    k3d kubeconfig merge {{ k3d_cluster_name }} --kubeconfig-merge-default
  when: k3d_cluster_state == 'present'

- name: Delete cluster
  ansible.builtin.command: k3d cluster delete {{ k3d_cluster_name }} --all
  when: k3d_cluster_state == 'absent' and _k3d_cluster_exists

- name: Delete registry
  ansible.builtin.command: k3d registry delete k3d-{{ k3d_registry_name }}
  when: k3d_cluster_state == 'absent'
  register: _registry_delete
  failed_when: _registry_delete.rc != 0 and 'No nodes found' not in _registry_delete.stderr
