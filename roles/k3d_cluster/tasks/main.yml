---
- name: Get existing clusters
  ansible.builtin.command: k3d cluster list -o json
  register: _k3d_clusters
  changed_when: false

- name: Set cluster_exists fact
  ansible.builtin.set_fact:
    _k3d_cluster_exists: "{{ k3d_cluster_name in (_k3d_clusters.stdout | from_json | map(attribute='name') | list) }}"

- name: Create cluster
  when: k3d_cluster_state == 'present' and not _k3d_cluster_exists
  block:
    - name: Create directory for custom resolv.conf
      ansible.builtin.file:
        path: "{{ k3d_resolv_conf | dirname }}"
        state: directory
        mode: "0755"

    - name: Create custom resolv.conf for k3d nodes
      ansible.builtin.copy:
        dest: "{{ k3d_resolv_conf }}"
        content: "{{ k3d_dns_servers | map('regex_replace', '^', 'nameserver ') | join('\n') }}\n"
        mode: "0644" 

    - name: Create registry (idempotent)
      ansible.builtin.command: k3d registry create {{ k3d_registry_name }} --port {{ k3d_registry_port }}
      register: _registry_create
      failed_when: _registry_create.rc != 0 and 'already exists' not in _registry_create.stderr

    - name: Create k3d cluster
      ansible.builtin.command: >
        k3d cluster create {{ k3d_cluster_name }}
        --servers {{ k3d_servers }}
        --agents {{ k3d_agents }}
        --port {{ k3d_port_http }}
        --port {{ k3d_port_https }}
        --registry-use k3d-{{ k3d_registry_name }}:{{ k3d_registry_port }}
        --registry-config {{ k3d_registries_config }}
        --volume {{ k3d_resolv_conf }}:/etc/resolv.conf@all
        --k3s-arg "--disable=traefik@server:*"
        --wait
        --timeout 120s

- name: Save and merge kubeconfig
  ansible.builtin.shell: |
    set -e
    mkdir -p "$(dirname "{{ k3d_kubeconfig_path }}")"
    k3d kubeconfig get {{ k3d_cluster_name }} > "{{ k3d_kubeconfig_path }}"
    chmod 600 "{{ k3d_kubeconfig_path }}"
    k3d kubeconfig merge {{ k3d_cluster_name }} --kubeconfig-merge-default
  when: k3d_cluster_state == 'present'

- name: Get registry IP in cluster network
  ansible.builtin.command: >
    docker inspect k3d-{{ k3d_registry_name }}
    --format "{{ '{{' }}(index .NetworkSettings.Networks \"k3d-{{ k3d_cluster_name }}\").IPAddress{{ '}}' }}"
  register: _registry_ip
  changed_when: false
  when: k3d_cluster_state == 'present'

- name: Patch CoreDNS NodeHosts to resolve k3d registry from pods
  ansible.builtin.shell: |
    set -e
    KUBECONFIG={{ k3d_kubeconfig_path }}
    REGISTRY_IP={{ _registry_ip.stdout }}
    REGISTRY_NAME=k3d-{{ k3d_registry_name }}
    # Get current NodeHosts, strip any existing registry entry, append fresh one
    CURRENT=$(kubectl get configmap coredns -n kube-system \
      -o jsonpath='{.data.NodeHosts}' | grep -v "${REGISTRY_NAME}")
    NEW_HOSTS="${CURRENT}${REGISTRY_IP} ${REGISTRY_NAME}"
    kubectl patch configmap coredns -n kube-system --type=merge \
      -p "{\"data\":{\"NodeHosts\":\"${NEW_HOSTS}\n\"}}"
    kubectl rollout restart deployment/coredns -n kube-system
  environment:
    KUBECONFIG: "{{ k3d_kubeconfig_path }}"
  changed_when: true
  when: k3d_cluster_state == 'present'

- name: Patch CoreDNS to forward to real DNS servers instead of resolv.conf
  # systemd-resolved stub (127.0.0.53) is unreachable from inside Docker containers.
  # Override forward directive to use the configured DNS servers directly.
  ansible.builtin.shell: |
    set -e
    DNS="{{ k3d_dns_servers | join(' ') }}"
    CURRENT=$(kubectl get cm coredns -n kube-system -o jsonpath='{.data.Corefile}')
    if ! echo "$CURRENT" | grep -q "forward . /etc/resolv.conf"; then
      echo "CoreDNS already using direct DNS servers, skipping"
      exit 0
    fi
    kubectl get cm coredns -n kube-system -o json \
      | sed "s|forward . /etc/resolv.conf|forward . ${DNS}|" \
      | kubectl apply -f -
    kubectl rollout restart deployment/coredns -n kube-system
    kubectl rollout status deployment/coredns -n kube-system --timeout=60s
  environment:
    KUBECONFIG: "{{ k3d_kubeconfig_path }}"
  changed_when: true
  when: k3d_cluster_state == 'present'

- name: Delete cluster
  ansible.builtin.command: k3d cluster delete {{ k3d_cluster_name }} --all
  when: k3d_cluster_state == 'absent' and _k3d_cluster_exists

- name: Delete registry
  ansible.builtin.command: k3d registry delete k3d-{{ k3d_registry_name }}
  when: k3d_cluster_state == 'absent'
  register: _registry_delete
  failed_when: _registry_delete.rc != 0 and 'No nodes found' not in _registry_delete.stderr and "Didn't find container" not in _registry_delete.stderr

- name: Remove custom resolv.conf
  ansible.builtin.file:
    path: "{{ k3d_resolv_conf }}"
    state: absent
  when: k3d_cluster_state == 'absent'
