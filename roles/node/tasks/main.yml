---
- name: Check if Node.js is installed
  ansible.builtin.command: node --version
  register: _node_check
  changed_when: false
  failed_when: false

- name: Install Node.js
  when: _node_check.rc != 0
  become: true
  block:
    - name: Install dependencies
      ansible.builtin.apt:
        name: [ca-certificates, curl, gnupg]
        state: present
        update_cache: true

    - name: Add Nodesource GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Add Nodesource repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install nodejs
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true
